<!DOCTYPE html>
<html>
<head>
    <title>Goody Ingredients List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1> Goody Ingredients List </h1>

<div class="container">

    <label>Pilih Ingredients:</label>
    <select id="filter">
        <option value="all">-- Tampilkan Semua --</option>
    </select>

    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Ingredient</th>
                <th>Description</th>
                <th>Image</th>
            </tr>
        </thead>

        <tbody id="data"></tbody>
    </table>

</div>

<script src="script.js"></script>

</body>
</html>
